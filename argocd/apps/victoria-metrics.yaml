apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-metrics
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/DenysMelnychenko/devops-learning.git
    targetRevision: main
    path: k8s/monitoring
    helm:
      chart: victoria-metrics-k8s-stack
      version: "0.72.4"
      releaseName: vm-stack
      valueFiles:
        - values.yaml
      ignoreMissingValueFiles: false
  sourceRepos:
    - https://victoriametrics.github.io/helm-charts/
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true